<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agentstore — multi-agent commerce assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;
      --accent-2: #818cf8;
      --user: #22d3ee;
      --sales: #34d399;
      --inventory: #fbbf24;
      --reviews: #f472b6;
      --customer: #a78bfa;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--panel-2);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header .sub { color: var(--muted); font-size: 0.85rem; margin-left: auto; }
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }
    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .ex {
      background: var(--panel);
      border: 1px solid var(--panel-2);
      color: var(--text);
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .ex:hover { background: var(--panel-2); border-color: var(--accent); }
    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-right: 0.5rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--panel-2);
      border-bottom-left-radius: 4px;
    }
    .msg.error {
      align-self: flex-start;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid var(--error);
      color: var(--error);
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-bottom: 0.4rem;
    }
    .badge.sales { background: rgba(52, 211, 153, 0.15); color: var(--sales); }
    .badge.inventory { background: rgba(251, 191, 36, 0.15); color: var(--inventory); }
    .badge.reviews { background: rgba(244, 114, 182, 0.15); color: var(--reviews); }
    .badge.customer { background: rgba(167, 139, 250, 0.15); color: var(--customer); }
    .badge.unknown { background: var(--panel-2); color: var(--muted); }
    .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--panel-2);
    }
    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--panel-2);
      background: var(--panel);
      color: var(--text);
      font-size: 0.95rem;
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-2); }
    button:disabled { background: var(--panel-2); cursor: not-allowed; }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.4s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <header>
    <h1>🛍️ agentstore</h1>
    <span class="sub">LangGraph supervisor · 4 specialist agents · Claude</span>
  </header>
  <main>
    <div class="examples" id="examples">
      <button class="ex" data-q="What were our total sales and profit?">Total sales and profit?</button>
      <button class="ex" data-q="Which products are low on stock?">Low-stock products?</button>
      <button class="ex" data-q="What are the most common return reasons?">Top return reasons?</button>
      <button class="ex" data-q="Who are our top 5 customers by spend?">Top 5 customers?</button>
    </div>
    <div class="messages" id="messages"></div>
    <form id="form">
      <input id="input" type="text" autocomplete="off"
             placeholder="Ask about sales, inventory, reviews, or customers..." />
      <button id="send" type="submit">Send</button>
    </form>
  </main>
  <script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    document.querySelectorAll('.ex').forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = btn.dataset.q;
        input.focus();
      });
    });

    function bubble(role, html, agent, latency) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'assistant' && agent) {
        const cls = ['sales','inventory','reviews','customer'].includes(agent) ? agent : 'unknown';
        div.innerHTML = `<span class="badge ${cls}">${agent}</span><div>${html}</div>`
                      + (latency ? `<div class="meta">${latency} ms</div>` : '');
      } else {
        div.textContent = html;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function ask(q) {
      bubble('user', q);
      const loading = document.createElement('div');
      loading.className = 'msg assistant';
      loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
      messages.appendChild(loading);
      messages.scrollTop = messages.scrollHeight;
      send.disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q }),
        });
        const data = await res.json();
        loading.remove();
        if (!res.ok) {
          bubble('error', data.detail || 'Request failed.');
          return;
        }
        bubble('assistant', escapeHtml(data.answer).replace(/\n/g, '<br>'), data.agent, data.latency_ms);
      } catch (e) {
        loading.remove();
        bubble('error', `Network error: ${e.message}`);
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      input.value = '';
      ask(q);
    });
  </script>
</body>
</html>
